<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSAT Practice Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="test-common.css">
</head>
<body>

<div class="mode-toggle">
  <a class="mode-btn inactive" href="index.html">SSAT</a>
  <a class="mode-btn inactive" href="eoc.html">EOC</a>
  <a class="mode-btn active" href="tests.html">Tests</a>
</div>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode">🌙</button>

<header>
  <div class="gac-crest">⚔️</div>
  <p class="future-tag">FUTURE SPARTAN</p>
  <h1 id="test-title">Practice Test</h1>
  <p class="subtitle">SSAT Upper Level &middot; Quantitative</p>
</header>

<div class="container">

  <!-- TEST TAKING -->
  <div id="test-taking">
    <div class="progress-bar">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">1 / 30</div>
    </div>

    <div class="q-card">
      <div class="q-header">
        <span class="q-number" id="q-number">Question 1</span>
        <span class="q-topic" id="q-topic">Slope</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="choices-list" id="choices-list"></div>
    </div>

    <div class="q-controls">
      <button class="q-nav-btn" id="prev-btn" onclick="prevQuestion()">← Prev</button>
      <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">⚑ Flag</button>
      <button class="q-nav-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>

    <div class="q-dots" id="q-dots"></div>
  </div>

  <!-- REVIEW BEFORE SUBMIT -->
  <div id="review-panel" style="display:none"></div>

  <!-- RESULTS -->
  <div id="results-container" style="display:none"></div>

  <footer>Built for Jackson Bynum &middot; Future GAC Spartan &middot; April 2026</footer>
</div>

<script src="test-data.js"></script>
<script src="test-data-pt2.js"></script>
<script src="test-data-timed.js"></script>
<script src="test-common.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var rawId = params.get('id') || '1';
  var tid, title;

  if (rawId.indexOf('timed') === 0) {
    tid = rawId;
    var num = rawId.replace('timed', '');
    title = 'Timed Quiz ' + num;
  } else {
    tid = 'test' + parseInt(rawId);
    title = 'Practice Test ' + parseInt(rawId);
  }

  document.getElementById('test-title').textContent = title;
  document.title = 'SSAT ' + title;

  var meta = null;
  if (typeof TIMED_TEST_META !== 'undefined') {
    TIMED_TEST_META.forEach(function(m) { if (m.id === tid) meta = m; });
  }

  if (meta) {
    document.querySelector('.subtitle').textContent = 'SSAT Upper Level · Quantitative · ' + formatTime(meta.timeLimit) + ' limit';
  }

  if (ALL_TEST_DATA[tid]) {
    initTest(tid, ALL_TEST_DATA[tid], meta);
  } else {
    document.getElementById('test-taking').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text3)"><h2>Test not found</h2><p>Go back to the <a href="tests.html" style="color:var(--accent-light)">dashboard</a>.</p></div>';
  }
})();
</script>
</body>
</html>
